services:
  postgres:
    image: postgres:17
    container_name: twa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: twa
      POSTGRES_USER: twa
      POSTGRES_PASSWORD: twa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
